# Container mode: `docker compose up` brings up Postgres + the .NET API + the Python
# poller — the whole two-runtime stack.
# Local mode: `docker compose up -d db` then `dotnet run` (or `applytrack poll`)
# against localhost — the same build, just a different connection string.
services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-applytrack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-applytrack}
      POSTGRES_DB: ${POSTGRES_DB:-applytrack}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-applytrack}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: ApplyTrack.Api/Dockerfile
    environment:
      ConnectionStrings__Postgres: "Host=db;Port=5432;Database=${POSTGRES_DB:-applytrack};Username=${POSTGRES_USER:-applytrack};Password=${POSTGRES_PASSWORD:-applytrack}"
      ASPNETCORE_URLS: "http://+:8080"
      # Cover-letter AI (all optional; see .env.example). Empty defaults leave drafting
      # off until a tenant configures their own endpoint in the SPA's AI panel.
      Llm__BaseUrl: ${Llm__BaseUrl:-}
      Llm__Model: ${Llm__Model:-}
      Llm__ApiKey: ${Llm__ApiKey:-}
      APPLYTRACK_SECRETS_KEY: ${APPLYTRACK_SECRETS_KEY:-}
      # Email / magic-link delivery (all optional; see .env.example). With Email__Host
      # unset, login links are logged to the console instead of sent — no email config
      # needed to try auth locally. Set Email__Host to relay through any SMTP provider.
      Email__Host: ${Email__Host:-}
      Email__Port: ${Email__Port:-587}
      Email__Username: ${Email__Username:-}
      Email__Password: ${Email__Password:-}
      Email__From: ${Email__From:-}
      Email__FromName: ${Email__FromName:-OSApplyTrack}
    # 8080 is contested (vLLM, llama.cpp, and half of all dev tools default to it).
    # If it's already taken, Docker fails the bind loudly ("address already in use")
    # rather than silently winning — relocate by setting API_PORT in .env.
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # The Python discovery poller (second runtime). Shares the same Postgres; the .NET
  # API owns the schema (DbUp migrates it on startup), so on a cold boot the poller's
  # first tick may run before migrations land — its loop retries, no action needed.
  poller:
    build:
      context: .
      dockerfile: Dockerfile.poller
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-applytrack}:${POSTGRES_PASSWORD:-applytrack}@db:5432/${POSTGRES_DB:-applytrack}"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
