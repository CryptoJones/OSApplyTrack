#
# Cut a release: on a `v*` tag, build both runtime images and push them to the
# GitHub Container Registry (ghcr.io), then publish a GitHub Release. Uses the
# built-in GITHUB_TOKEN — no registry secrets to manage. GHCR is GitHub-specific,
# so this lives only here (Codeberg gets the tag as the canonical source).
name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create the GitHub Release
  packages: write   # push images to ghcr.io

jobs:
  images:
    name: build + push ${{ matrix.name }} image
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: api
            context: ./api
            dockerfile: api/ApplyTrack.Api/Dockerfile
          - name: poller
            context: .
            dockerfile: Dockerfile.poller
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/cryptojones/osapplytrack-${{ matrix.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest
      - uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    name: publish GitHub Release
    needs: images
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          NOTES: |
            OSApplyTrack ${{ github.ref_name }} — self-hosted, multi-tenant job-application tracker.

            ## Container images (GitHub Container Registry)

            ```bash
            docker pull ghcr.io/cryptojones/osapplytrack-api:${{ github.ref_name }}
            docker pull ghcr.io/cryptojones/osapplytrack-poller:${{ github.ref_name }}
            ```

            `latest` and the matching MAJOR / MAJOR.MINOR tags are published too.

            ## Run it

            `docker compose up` brings up Postgres + API + poller — see the
            [README](https://github.com/CryptoJones/OSApplyTrack#quickstart-docker).
        run: gh release create "$TAG" --title "$TAG" --verify-tag --notes "$NOTES"
