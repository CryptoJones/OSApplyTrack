#
# CI for the GitHub mirror. Codeberg/Forgejo runs the audit-only workflow in
# .forgejo/workflows/ (its container runner has no Docker, so it can't host the
# Testcontainers .NET suite). GitHub's hosted ubuntu runners ship Docker, so here
# we run *both* test suites end to end plus the same dependency audit.
name: ci

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"  # weekly Mon 06:00 UTC — catch CVEs disclosed after merge

jobs:
  dotnet:
    name: .NET — test + audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Test (xUnit + Testcontainers-Postgres)
        working-directory: api
        run: dotnet test --logger "console;verbosity=normal"
      - name: Audit NuGet packages
        working-directory: api
        run: |
          dotnet list package --vulnerable --include-transitive 2>&1 | tee /tmp/audit.txt
          if grep -q "has the following vulnerable packages" /tmp/audit.txt; then
            echo "::error::Vulnerable NuGet packages found"; exit 1
          fi

  python:
    name: Python — lint + test + audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip   # keep the toolchain current so pip-audit isn't tripped by a stale runner pip
          pip install --no-cache-dir -e ".[dev]" pip-audit
      - name: Lint (ruff + mypy)
        run: |
          ruff check src tests
          mypy src
      - name: Test (pytest)
        run: pytest -q
      - name: Audit Python packages
        run: pip-audit
